name: Frontend DevSecOps CI/CD Pipeline

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-devsecops-pipeline.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-devsecops-pipeline.yml'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

env:
  NODE_VERSION: "20"
  WORKING_DIRECTORY: "./frontend"
  AWS_REGION: "us-east-2"
  NODE_VERSION_NVM: "21"

  # S3 Bucket Configuration
  S3_BUCKET_DEV: "appeals-dev.penguinai.co"
  S3_BUCKET_STAGE: "hcc-icd-stage.penguinai.co"
  S3_BUCKET_PROD: "hcc-icd.penguinai.co"

jobs:
  deploy-to-dev-s3:
    name: CD - Deploy to Dev (S3)
    runs-on: [self-hosted, stage]
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        continue-on-error: true
        with:
          node-version: '21'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        continue-on-error: true
        run: |
          npm i vite --save-dev --force

      - name: Build Frontend
        working-directory: ${{ env.WORKING_DIRECTORY }}
        continue-on-error: true
        run: |
          npm run build:dev

      - name: Deploy to S3 Dev
        id: deploy
        working-directory: ${{ env.WORKING_DIRECTORY }}
        continue-on-error: true
        run: |
          # Sync build files to S3 bucket
          aws s3 sync dist/ s3://${{ env.S3_BUCKET_DEV }}/ --delete
          # Get S3 website URL
          echo "app_url=https://${{ env.S3_BUCKET_DEV }}" >> $GITHUB_OUTPUT

      - name: Verify Deployment
        continue-on-error: true
        run: |
          echo "Verifying dev deployment..."
          aws s3 ls s3://${{ env.S3_BUCKET_DEV }}/

      - name: Deployment Success Notification
        if: success()
        continue-on-error: true
        run: |
          echo "Frontend deployment to dev environment completed successfully!"
