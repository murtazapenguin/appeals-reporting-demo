name: Backend DevSecOps CI/CD Pipeline

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-devsecops-pipeline.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-devsecops-pipeline.yml'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

env:
  PYTHON_VERSION: "3.11"
  WORKING_DIRECTORY: "./backend"
  AWS_REGION: "us-east-2"

  # Dev Environment
  ECR_REPOSITORY_DEV: "appeals-dev"
  EKS_CLUSTER_DEV: "penguinai-dev-eks-cluster"

  # Stage Environment
  ECR_REPOSITORY_STAGE: "hcc-stage"
  EKS_CLUSTER_STAGE: "penguinai-stage-eks-cluster"

  # Prod Environment
  ECR_REPOSITORY_PROD: "hcc"
  EKS_CLUSTER_PROD: "penguinai-prod-eks-cluster"

  # Kubernetes Config (shared across all environments)
  K8S_DEPLOYMENT_NAME: "appeals-deployment"
  K8S_CONTAINER_NAME: "appeals"
  K8S_NAMESPACE: "appeals"

jobs:
  # ============================================================================
  # SAST - Static Application Security Testing
  # ============================================================================

  # ============================================================================
  # CD - Continuous Deployment
  # ============================================================================
  #
  # Branch Deployment Strategy:
  # - HCC_Dev, feat/dal, or release/hcc_dev_0105 branch → dev environment (EKS)
  # - stage branch → stage environment (EKS)
  # - prod branch → prod environment (EKS)
  # ============================================================================

  deploy-to-dev:
    name: CD - Deploy to Dev (EKS)
    runs-on: [self-hosted, stage]
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        continue-on-error: true
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        continue-on-error: true

      - name: Build and Push Docker Image
        id: build-image
        working-directory: ${{ env.WORKING_DIRECTORY }}
        continue-on-error: true
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY_DEV }}
        run: |
          # Sanitize branch name for Docker tag (replace / with -)
          BRANCH_NAME="${{ github.ref_name }}"
          SAFE_BRANCH_NAME="${BRANCH_NAME//\//-}"
          IMAGE_TAG="${SAFE_BRANCH_NAME}-$(date +%Y%m%d-%H%M%S)"
          docker build --target runtime -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update kubeconfig for EKS
        continue-on-error: true
        run: |
          echo "Updating kubeconfig for EKS cluster: ${{ env.EKS_CLUSTER_DEV }}"
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_DEV }} --region ${{ env.AWS_REGION }}

          # Verify AWS identity
          echo "Current AWS identity:"
          aws sts get-caller-identity

          # Verify kubeconfig
          echo "Kubeconfig context:"
          kubectl config current-context

          # Test cluster access
          echo "Testing cluster access:"
          kubectl auth can-i get pods -n ${{ env.K8S_NAMESPACE }} || echo "WARNING: No access to get pods"

      - name: Deploy to EKS Dev
        id: deploy
        working-directory: ${{ env.WORKING_DIRECTORY }}
        continue-on-error: true
        run: |
          IMAGE_TAG="${{ steps.build-image.outputs.image }}"
          IMAGE_TAG="${IMAGE_TAG##*/}"

          # Update Kubernetes deployment with new image
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT_NAME }} \
            ${{ env.K8S_CONTAINER_NAME }}=${{ steps.build-image.outputs.image }} \
            -n ${{ env.K8S_NAMESPACE }}

          # Wait for rollout to complete
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

      - name: Verify Deployment
        continue-on-error: true
        run: |
          echo "Verifying dev deployment..."
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          kubectl get deployments -n ${{ env.K8S_NAMESPACE }}

      - name: Deployment Success Notification
        if: success()
        continue-on-error: true
        run: |
          echo "Deployment to dev environment completed successfully!"

      - name: Cleanup Docker Images
        if: always()
        run: |
          echo "Cleaning up Docker images on runner..."
          # Remove the specific image that was just built
          docker rmi ${{ steps.build-image.outputs.image }} || true
          # Remove dangling images to free up space
          docker image prune -f || true
          echo "Docker cleanup completed"
